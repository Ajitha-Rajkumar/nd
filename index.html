<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPD ChatBot - Network Planning &amp; Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== Variables ===== */
        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #00bcd4;
            --accent-light: #4dd0e1;
            --bg: #e8eaf6;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #eeeeee;
            --gray-300: #e0e0e0;
            --gray-600: #757575;
            --text: #212121;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
            --chat-width: 560px;
            --badge-bg: #e8eaf6;
            --badge-border: #c5cae9;
            --badge-text: #1a237e;
            --line-color: #c5cae9;
            --note-bg: #fff3e0;
            --note-border: #ff9800;
            --note-text: #e65100;
        }

        /* ===== Dark Theme ===== */
        body.dark {
            --primary: #7986cb;
            --primary-light: #9fa8da;
            --accent: #4dd0e1;
            --accent-light: #80deea;
            --bg: #0f0f1a;
            --white: #1a1a2e;
            --gray-100: #22223a;
            --gray-200: #2a2a45;
            --gray-300: #3a3a58;
            --gray-600: #9999bb;
            --text: #e0e0ef;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --badge-bg: #22223a;
            --badge-border: #3a3a58;
            --badge-text: #9fa8da;
            --line-color: #3a3a58;
            --note-bg: #2a2010;
            --note-border: #ff9800;
            --note-text: #ffb74d;
        }
        body.dark .header {
            background: linear-gradient(135deg, #1a1a2e, #2a2a45);
        }
        body.dark .msg.bot .avatar {
            background: linear-gradient(135deg, #3949ab, #5c6bc0);
        }
        body.dark .msg.user .bubble {
            background: linear-gradient(135deg, #3949ab, #5c6bc0);
        }
        body.dark .msg.bot .bubble { background: var(--white); }
        body.dark .bubble h3 { color: var(--accent); }
        body.dark .bubble a { color: var(--accent); }
        body.dark .quick-btn:hover {
            background: var(--primary); color: #fff; border-color: var(--primary);
        }
        body.dark #userInput {
            background: var(--white); color: var(--text); border-color: var(--gray-300);
        }
        body.dark #userInput::placeholder { color: var(--gray-600); }
        body.dark .input-area { background: var(--gray-200); border-color: var(--gray-300); }
        body.dark .topic-chip:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        body.dark .header-btn { color: var(--accent); }
        body.dark .header-btn:hover { background: rgba(255,255,255,0.1); }
        body.dark .btn-send {
            background: linear-gradient(135deg, #3949ab, #5c6bc0);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== Header ===== */
        .header {
            width: var(--chat-width);
            max-width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 10px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border-radius: 0 0 var(--radius) var(--radius);
            z-index: 10;
            transition: background 0.3s;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; color: #fff; }
        .header-left p { font-size: 0.75rem; opacity: 0.8; margin-top: 1px; color: #fff; }
        .header-left i { color: var(--accent); margin-right: 8px; }
        .header-actions { display: flex; gap: 6px; }
        .header-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: rgba(255,255,255,0.15);
            color: #fff; cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }

        /* ===== Chat Wrapper - centered with blank sides ===== */
        .chat-wrapper {
            width: var(--chat-width);
            max-width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Messages Area ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        /* ===== Message Bubbles ===== */
        .msg { display: flex; gap: 8px; max-width: 100%; animation: fadeIn 0.3s ease; }
        .msg.user { flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; flex-shrink: 0;
        }
        .msg.bot .avatar { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
        .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; }

        .bubble {
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 0.88rem;
            line-height: 1.55;
            box-shadow: var(--shadow);
            max-width: calc(100% - 44px);
            transition: background 0.3s;
        }
        .msg.bot .bubble { background: var(--white); border-bottom-left-radius: 4px; }
        .msg.user .bubble { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; border-bottom-right-radius: 4px; }

        .bubble h3 { font-size: 0.95rem; color: var(--primary); margin-bottom: 8px; transition: color 0.3s; }
        .bubble .step { display: flex; gap: 8px; margin: 6px 0; align-items: flex-start; }
        .bubble .step-num {
            background: var(--primary); color: #fff;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
        }
        .bubble .step-text { flex: 1; }
        .bubble .note {
            background: var(--note-bg); border-left: 3px solid var(--note-border);
            padding: 6px 10px; border-radius: 4px;
            font-size: 0.82rem; margin-top: 8px; color: var(--note-text);
        }
        .bubble ul { padding-left: 16px; margin: 4px 0; }
        .bubble li { margin: 3px 0; }
        .bubble a { color: var(--primary); text-decoration: underline; transition: color 0.3s; }

        /* ===== Role/System Badges ===== */
        .meta-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 12px; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 11px; border-radius: 14px; font-size: 0.74rem; font-weight: 600;
            background: var(--badge-bg); color: var(--badge-text);
            border: 1.5px solid var(--badge-border); transition: all 0.3s;
        }
        .badge i { font-size: 0.68rem; }

        /* ===== Steps with connecting line ===== */
        .steps-wrap {
            position: relative;
            padding-left: 28px;
            margin: 6px 0;
        }
        .steps-wrap::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 14px;
            bottom: 14px;
            width: 2.5px;
            background: var(--line-color);
            border-radius: 2px;
            transition: background 0.3s;
        }
        .steps-wrap .step {
            position: relative;
            display: flex;
            gap: 10px;
            margin: 0;
            padding: 7px 0;
            align-items: flex-start;
        }
        .steps-wrap .step-num {
            position: absolute;
            left: -28px;
            z-index: 1;
            border: 2.5px solid var(--white);
            box-shadow: 0 0 0 2px var(--line-color);
            transition: all 0.3s;
        }
        .steps-wrap .step-text { flex: 1; }
        .bubble .phase-label {
            font-weight: 700; color: var(--primary);
            padding: 8px 0 2px; font-size: 0.85rem;
            margin-top: 8px; transition: color 0.3s;
        }

        /* ===== Quick Buttons ===== */
        .quick-actions {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 16px;
            justify-content: center;
        }
        .quick-btn {
            background: var(--white); border: 1px solid var(--gray-300);
            padding: 7px 14px; border-radius: 20px;
            font-size: 0.8rem; cursor: pointer; color: var(--primary);
            transition: all 0.2s ease; display: flex; align-items: center; gap: 5px;
        }
        .quick-btn:hover {
            background: var(--primary); color: #fff;
            border-color: var(--primary); transform: translateY(-1px);
        }

        /* ===== Topic Chips inside messages ===== */
        .topic-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .topic-chip {
            background: var(--gray-100); border: 1px solid var(--gray-300);
            padding: 5px 10px; border-radius: 16px; font-size: 0.78rem;
            cursor: pointer; color: var(--primary); transition: all 0.2s;
        }
        .topic-chip:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ===== Input Area ===== */
        .input-area {
            padding: 10px 16px 14px;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            width: var(--chat-width);
            max-width: 100%;
            transition: all 0.3s;
        }
        .input-row { display: flex; gap: 8px; }
        #userInput {
            flex: 1; padding: 12px 16px;
            border: 2px solid var(--gray-300); border-radius: 24px;
            font-size: 0.9rem; outline: none; font-family: inherit;
            transition: all 0.3s; background: var(--white); color: var(--text);
        }
        #userInput:focus { border-color: var(--primary-light); }
        .btn-send {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff; border: none; cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .btn-send:hover { transform: scale(1.05); }

        /* ===== Typing ===== */
        .typing span {
            display: inline-block; width: 7px; height: 7px;
            background: var(--gray-600); border-radius: 50%;
            margin: 0 2px; animation: blink 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            :root { --chat-width: 100%; }
            .chat-messages { padding: 12px 10px; }
            .input-area { padding: 8px 10px 12px; }
            .header { padding: 8px 12px; }
            .header-left h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-row">
            <div class="header-left">
                <h1><i class="fas fa-network-wired"></i>NPD ChatBot</h1>
                <p>Network Planning &amp; Design Assistant</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="backBtn" title="Back to previous"><i class="fas fa-arrow-left"></i></button>
                <button class="header-btn" id="clearBtn" title="Main Menu"><i class="fas fa-home"></i></button>
                <button class="header-btn" id="themeBtn" title="Toggle Theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <!-- Chat Wrapper (centered) -->
    <div class="chat-wrapper">
        <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" id="quickActions" style="width:var(--chat-width);max-width:100%;">
        <button class="quick-btn" data-q="Get Access"><i class="fas fa-key"></i> Get Access</button>
        <button class="quick-btn" data-q="Scope & Planning"><i class="fas fa-map-marked-alt"></i> Scope &amp; Planning</button>
        <button class="quick-btn" data-q="Survey"><i class="fas fa-clipboard-check"></i> Survey</button>
        <button class="quick-btn" data-q="Design"><i class="fas fa-drafting-compass"></i> Design</button>
        <button class="quick-btn" data-q="BOQ & SOQ"><i class="fas fa-file-invoice"></i> BOQ &amp; SOQ</button>
        <button class="quick-btn" data-q="Release for Construction"><i class="fas fa-hard-hat"></i> Release for Construction</button>
        <button class="quick-btn" data-q="Roles & Tasks"><i class="fas fa-users-cog"></i> Roles &amp; Tasks</button>
        <button class="quick-btn" data-q="Glossary"><i class="fas fa-book"></i> Glossary</button>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Ask about NPD processes..." autocomplete="off">
            <button class="btn-send" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

<script>
// =====================================================
// KNOWLEDGE BASE — Step-by-step NPD Process Guide
// =====================================================
const KB = [
  {
    id: "get_access",
    topic: "Get Access",
    keywords: ["access","login","new user","url","oneinfra","super admin","role","permission","sign up","register"],
    answer: `<h3>Here's how to get access to the <b>NPD system</b>:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: New User</span>
  <span class="badge"><i class="fas fa-desktop"></i> System: One Fiber Portal (Web)</span>
</div>
<p class="phase-label"><b>For New Users</b></p>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">Login to the URL: <a href="https://osp.jio.com/oneinfra/" target="_blank">https://osp.jio.com/oneinfra/</a></span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">Select the required <b>Role</b> for access.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">The request will be sent to <b>NHQ Intercity / Intracity Super Admin</b> for approval.</span></div>
<div class="step"><span class="step-num">4</span><span class="step-text">After approval, system login and task execution will be enabled.</span></div>
</div>`
  },
  {
    id: "scope_planning",
    topic: "Scope & Planning",
    keywords: ["scope","planning","scope marking","scope definition","link record","planned route","intercity scope","scope release"],
    answer: `<h3>Here's how <b>Scope & Planning</b> works:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: NPE</span>
  <span class="badge"><i class="fas fa-desktop"></i> System: GIS (Web)</span>
</div>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">Sites are finalized through the <b>CR Portal</b>. The user marks the intercity scope in <b>GIS</b>.</span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">After planning, <b>Link ID</b>, <b>Span ID</b>, and business attributes are updated based on the intercity scope.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">User team plans new links and releases them in <b>GIS Planning DB</b>.</span></div>
<div class="step"><span class="step-num">4</span><span class="step-text"><b>GIS Scheduler</b> checks for new SPAN/Link in Planned_route. If found, it pushes state-wise records in the workflow table. Link status updates to <b>"Link Record Initiated"</b>.</span></div>
<div class="step"><span class="step-num">5</span><span class="step-text">Links become eligible for scope release and appear on the <b>Scope Release page</b> on the K2 main tile.</span></div>
<div class="step"><span class="step-num">6</span><span class="step-text">Select the specific link for scope release. Click <b>Release</b>.</span></div>
<div class="step"><span class="step-num">7</span><span class="step-text">If a link crosses multiple states, a confirmation message is displayed.</span></div>
<div class="step"><span class="step-num">8</span><span class="step-text">A <b>state-wise planned route released summary mail</b> is sent to all stakeholders.</span></div>
</div>`
  },
  {
    id: "route_planning",
    topic: "Route Planning in GIS",
    keywords: ["route planning","gis","planned route","road network","google map","intracity id","link id","span id","route name"],
    answer: `<h3>Here's how to <b>plan a route in GIS</b>:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: NPE</span>
  <span class="badge"><i class="fas fa-desktop"></i> System: GIS (Web)</span>
</div>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">Open <b>GIS</b> and navigate to the <b>Planned Route database</b>.</span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">Plan the route using <b>GIS Road Network</b> and <b>Google Maps</b> as references.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">Update the mandatory attributes:
<ul>
<li><b>Intracity ID</b></li>
<li><b>Link ID</b></li>
<li><b>Span ID</b></li>
<li><b>Route Name</b></li>
</ul></span></div>
</div>`
  },
  {
    id: "route_release",
    topic: "Route Release for Survey",
    keywords: ["route release","release for survey","one fiber portal","scope release","oneinfra","release scope","network type"],
    answer: `<h3>Here's how to <b>release a route for survey</b>:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: NPE</span>
  <span class="badge"><i class="fas fa-desktop"></i> System: One Fiber Portal / K2 (Web)</span>
</div>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">Login to <b>One Fiber Portal</b>: <a href="https://osp.jio.com/oneinfra/login" target="_blank">osp.jio.com/oneinfra/login</a></span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">Click on <b>"One Fiber Scope Release"</b>.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">Select <b>Network Type → Intracity</b>.</span></div>
<div class="step"><span class="step-num">4</span><span class="step-text">Select your <b>State</b>.</span></div>
<div class="step"><span class="step-num">5</span><span class="step-text">All eligible links from planned route will be displayed. Use <b>Quick Search</b> to find your route.</span></div>
<div class="step"><span class="step-num">6</span><span class="step-text">Verify <b>length</b> and <b>network type</b> carefully. Cross-check with planned route.</span></div>
<div class="step"><span class="step-num">7</span><span class="step-text">At the bottom, click <b>"Release"</b>. Select the link and release.</span></div>
</div>
<div class="note"><b>Important:</b> DO NOT release if details like length do not match with the planned route.</div>`
  },
  {
    id: "mail_notification_survey",
    topic: "Mail Notification for Survey",
    keywords: ["mail notification","email notification","survey notification","notification trigger","mdsurvey"],
    answer: `<h3>Here's how <b>survey mail notifications</b> work:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: InterCity FE / MPCM</span>
  <span class="badge"><i class="fas fa-mobile-alt"></i> System: mDSurvey (Mobile)</span>
</div>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">Once a link is released for survey, a <b>mail notification</b> is automatically triggered to all relevant users.</span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">A <b>state-wise planned route released summary mail</b> is also shared.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">The field user carries out the survey using the <b>mDSurvey app</b> (Mobile).</span></div>
<div class="step"><span class="step-num">4</span><span class="step-text">After completing the survey, user submits it for <b>O&M</b> and <b>NPE approval</b>.</span></div>
</div>`
  },
  {
    id: "survey",
    topic: "Survey",
    keywords: ["survey","survey process","joint survey","survey release","cpc scope","mdsurvey","survey approval","o&m approval","npe approval","survey span","feature","construction methodology"],
    answer: `<h3>Here's the complete <b>Survey Process</b>:</h3>
<div class="meta-badges">
  <span class="badge"><i class="fas fa-user-tag"></i> Role: CPC / InterCity FE</span>
  <span class="badge"><i class="fas fa-desktop"></i> System: K2 (Web)</span>
  <span class="badge"><i class="fas fa-mobile-alt"></i> System: mDSurvey (Mobile)</span>
</div>
<p class="phase-label"><b>Phase 1 — Survey Release (CPC)</b></p>
<div class="steps-wrap">
<div class="step"><span class="step-num">1</span><span class="step-text">CPC releases scope for survey from <b>K2 portal</b>.</span></div>
<div class="step"><span class="step-num">2</span><span class="step-text">Summary mails are sent: state-wise and all-state.</span></div>
<div class="step"><span class="step-num">3</span><span class="step-text">Select <b>Network Type → Intercity</b>, search for link details, select link-SPAN and release for survey.</span></div>
</div>
<p class="phase-label"><b>Phase 2 — Field Survey (mDSurvey App)</b></p>
<div class="steps-wrap">
<div class="step"><span class="step-num">4</span><span class="step-text">Login to <b>mDSurvey app</b> and select your role.</span></div>
<div class="step"><span class="step-num">5</span><span class="step-text">Select <b>Survey Span</b> → Click on span.</span></div>
<div class="step"><span class="step-num">6</span><span class="step-text">Add features: select <b>Construction Methodology</b>, <b>Construction Type</b>, and <b>Authority</b>.</span></div>
<div class="step"><span class="step-num">7</span><span class="step-text">Fill structure details: <b>Feature Type</b>, <b>Road Side</b>, <b>Terrain</b>, <b>Crossing Authority</b>.</span></div>

// =====================================================
// CHATBOT LOGIC
// =====================================================
const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const quickActions = document.getElementById('quickActions');
const backBtn = document.getElementById('backBtn');
const clearBtn = document.getElementById('clearBtn');
const themeBtn = document.getElementById('themeBtn');

// Chat history for back navigation
let chatHistory = []; // stores message count snapshots

const WELCOME_HTML = `<h3>Welcome to NPD ChatBot!</h3>
<p>The <b>NPD (Network Planning & Design)</b> is a workflow module in the <b>JIO Infra Build</b> platform that enables planning, designing, and releasing fiber optic network routes for construction across PAN India.</p>
<p style="margin-top:8px">The application integrates with <b>K2 workflow engine</b> for task management & approvals, <b>GIS</b> (Geographic Information System) for route planning & scope marking, <b>Network Engineer (NE)</b> for design automation, and <b>mDSurvey</b> mobile app for field surveys.</p>
<p style="margin-top:8px">This chatbot serves as a dedicated assistant, offering a <b>step-by-step guide</b> through the entire NPD lifecycle, including:</p>
<ul>
<li>Scope Definition & Route Planning</li>
<li>Route Release & Field Survey</li>
<li>Design Creation & Verification</li>
<li>BOQ, SOQ & CAPEX Processing</li>
<li>Construction Initiation</li>
</ul>
<p style="margin-top:8px">Click a button below or type your question to get started.</p>`;

// Welcome
addBot(WELCOME_HTML);

// Events
sendBtn.addEventListener('click', send);
userInput.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
document.querySelectorAll('.quick-btn').forEach(b => {
    b.addEventListener('click', () => { userInput.value = b.dataset.q; send(); });
});

// Back button — removes last user+bot message pair
backBtn.addEventListener('click', () => {
    if (chatHistory.length > 0) {
        const prevCount = chatHistory.pop();
        // Remove messages until we're back to previous count
        while (chatMessages.children.length > prevCount) {
            chatMessages.removeChild(chatMessages.lastChild);
        }
        if (chatMessages.children.length <= 1) {
            quickActions.style.display = 'flex';
        }
        scrollDown();
    }
});

// Clear button — back to main menu
clearBtn.addEventListener('click', () => {
    chatMessages.innerHTML = '';
    chatHistory = [];
    addBot(WELCOME_HTML);
    quickActions.style.display = 'flex';
    scrollDown();
});

// Theme toggle
let isDark = false;
themeBtn.addEventListener('click', () => {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    themeBtn.title = isDark ? 'Light Theme' : 'Dark Theme';
});

function send() {
    const q = userInput.value.trim();
    if (!q) return;

    // Save current message count before adding new messages
    chatHistory.push(chatMessages.children.length);

    addUser(q);
    userInput.value = '';
    quickActions.style.display = 'none';

    const tid = showTyping();
    setTimeout(() => {
        removeEl(tid);
        addBot(getAnswer(q));
        scrollDown();
    }, 350 + Math.random() * 300);
}

function addUser(text) {
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="avatar"><i class="fas fa-user"></i></div><div class="bubble">${esc(text)}</div>`;
    chatMessages.appendChild(d);
    scrollDown();
}

function addBot(html) {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = `<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">${html}</div>`;
    chatMessages.appendChild(d);
    d.querySelectorAll('.topic-chip').forEach(c => {
        c.addEventListener('click', () => { userInput.value = c.dataset.q; send(); });
    });
    scrollDown();
}

function showTyping() {
    const id = 't' + Date.now();
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = id;
    d.innerHTML = `<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatMessages.appendChild(d);
    scrollDown();
    return id;
}

function removeEl(id) { const el = document.getElementById(id); if (el) el.remove(); }
function scrollDown() { chatMessages.scrollTop = chatMessages.scrollHeight; }
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// =====================================================
// ANSWER ENGINE
// =====================================================
function getAnswer(query) {
    const q = query.toLowerCase().trim();

    // Greetings
    if (/^(hi|hello|hey|good\s*(morning|afternoon|evening))/i.test(q)) {
        return `<p>Hello! How can I help you with NPD today? You can ask me about any process like Scope & Planning, Survey, Design, or Construction.</p>`;
    }
    // Thanks
    if (/^(thanks?|thank\s*you|thx)/i.test(q)) {
        return `<p>You're welcome! Feel free to ask if you need anything else.</p>`;
    }
    // Help
    if (/^(help|what can you do)/i.test(q)) {
        return `<h3>How to Use</h3>
<ul>
<li>Ask about any NPD process (e.g., "How does survey work?")</li>
<li>Click the quick buttons for common topics</li>
<li>Type "all topics" to see everything I know</li>
<li>Use <b>←</b> to go back, <b>🏠</b> for main menu, <b>🌙</b> to toggle theme</li>
</ul>`;
    }
    // All topics
    if (/all\s*topics?|show\s*topics?|list\s*topics?|browse/i.test(q)) {
        const chips = KB.map(k => `<span class="topic-chip" data-q="${esc(k.topic)}">${esc(k.topic)}</span>`).join('');
        return `<h3>All NPD Topics (${KB.length})</h3><p>Click any topic:</p><div class="topic-chips">${chips}</div>`;
    }

    // Search KB
    const results = searchKB(q);

    if (results.length === 0) {
        const suggestions = KB.filter(k => ['get_access','scope_planning','survey','design','boq_soq','release_construction','roles_tasks','glossary'].includes(k.id))
            .map(k => `<span class="topic-chip" data-q="${esc(k.topic)}">${esc(k.topic)}</span>`).join('');
        return `<p>I couldn't find a match for "<b>${esc(query)}</b>". Try one of these topics:</p><div class="topic-chips">${suggestions}</div>`;
    }

    let html = results[0].answer;

    if (results.length > 1) {
        const chips = results.slice(1, 5).map(r => `<span class="topic-chip" data-q="${esc(r.topic)}">${esc(r.topic)}</span>`).join('');
        html += `<p style="margin-top:10px"><b>Related topics:</b></p><div class="topic-chips">${chips}</div>`;
    }

    return html;
}

function searchKB(query) {
    const q = query.toLowerCase().replace(/[^\w\s&]/g, ' ');
    const words = q.split(/\s+/).filter(w => w.length > 1);

    const stop = new Set(['the','and','for','are','but','not','you','all','can','has','have','been','will','with','what','when','where','which','who','how','this','that','from','they','about','would','there','their','tell','explain','describe','show','give','please','could','does','mean','also','than','then','just','like','more','some','such','only','other','very','each','know','about','into','me']);
    const terms = words.filter(w => !stop.has(w));
    const search = terms.length > 0 ? terms : words;

    const scored = KB.map(entry => {
        let score = 0;
        const topicL = entry.topic.toLowerCase();
        const kws = entry.keywords;

        // Exact topic match
        if (topicL === q) score += 100;
        if (topicL.includes(q)) score += 50;
        if (q.includes(topicL) && topicL.length > 3) score += 40;

        search.forEach(t => {
            if (topicL.includes(t)) score += 25;
            if (kws.some(k => k.includes(t) || t.includes(k))) score += 15;
        });

        // Bigram similarity
        score += bigramSim(q, topicL) * 12;

        return { ...entry, score };
    });

    return scored.filter(s => s.score > 8).sort((a, b) => b.score - a.score);
}

function bigramSim(a, b) {
    const bg = s => { const r = new Set(); for (let i = 0; i < s.length - 1; i++) r.add(s.substr(i, 2)); return r; };
    const ba = bg(a), bb = bg(b);
    let n = 0; ba.forEach(x => { if (bb.has(x)) n++; });
    const total = ba.size + bb.size;
    return total === 0 ? 0 : (2 * n) / total;
}
